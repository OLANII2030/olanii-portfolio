<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message sent — Olanii Tsegaye</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #E0002A;
      --bg:       #080808;
      --surface:  #111;
      --border:   #1e1e1e;
      --text:     #fff;
      --muted:    #777;
      --subtle:   #333;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap {
      text-align: center;
      max-width: 440px;
    }

    .icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(224, 0, 42, 0.08);
      border: 0.5px solid rgba(224, 0, 42, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .icon-wrap svg {
      width: 24px;
      height: 24px;
      stroke: var(--red);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
    }

    .title {
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 40px;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 28px;
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .back-btn:hover {
      border-color: var(--red);
      color: var(--text);
    }
  </style>
</head>
<body>

  <div class="wrap">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <p class="label">Message received</p>
    <h1 class="title">I'll get back to you<br/>as soon as possible.</h1>
    <p class="sub">
      Your message went straight to my inbox.<br/>
      I read every one personally and reply within 24 hours —
      usually much sooner.
    </p>

    <a href="http://localhost:3001" class="back-btn">← Back to contact</a>

  </div>

</body>
</html>
