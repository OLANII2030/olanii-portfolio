<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Olanii's Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="Images/Screenshot 2026-03-10 at 4.16.24 in the afternoon.png" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow-x: clip; max-width: 100%; width: 100%; }
    img, video, svg, canvas { max-width: 100%; height: auto; }

    :root {
      --red:       #E0002A;
      --red-dark:  #B8001F;
      --bg:        #0a0a0a;
      --surface:   #141414;
      --border:    #222;
      --text:      #fff;
      --muted:     #888;
      --subtle:    #444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
    }

    /* ─── Top accent bar ─── */
    .accent-bar {
      width: 32px;
      height: 3px;
      background: var(--red);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .card-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 26px;
      font-weight: 500;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 10px;
    }

    .card-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* ─── Form ─── */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #0f0f0f;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease;
    }

    input::placeholder { color: var(--subtle); }

    input:focus {
      border-color: var(--red);
    }

    .optional {
      font-size: 11px;
      color: var(--subtle);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 6px;
    }

    /* ─── Submit button ─── */
    .submit-btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: var(--red);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .submit-btn:hover  { background: var(--red-dark); }
    .submit-btn:active { transform: scale(0.99); }

    .submit-btn:disabled {
      background: var(--subtle);
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Error message ─── */
    .error-msg {
      display: none;
      font-size: 13px;
      color: #ff6b6b;
      margin-top: 14px;
      text-align: center;
    }

    /* ─── Footer note ─── */
    .footer-note {
      font-size: 12px;
      color: var(--subtle);
      text-align: center;
      margin-top: 24px;
      line-height: 1.6;
    }

    @media (max-width: 520px) {
      .card { padding: 36px 24px; }
      .card-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="accent-bar"></div>

    <p class="card-label">One step away</p>
    <h1 class="card-title">Get my resume</h1>
    <p class="card-sub">
      Fill in the details below and I'll send it straight to your inbox —
      no waiting, no follow-up required.
    </p>

    <form id="resumeForm" action="/submit" method="POST">

      <div class="form-group">
        <label for="full_name">Full name</label>
        <input
          type="text"
          id="full_name"
          name="full_name"
          placeholder="Your full name"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="company">
          Company
          <span class="optional">— optional</span>
        </label>
        <input
          type="text"
          id="company"
          name="company"
          placeholder="Where do you work?"
          autocomplete="organization"
        />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@company.com"
          required
          autocomplete="email"
        />
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        Send me the resume →
      </button>

      <p class="error-msg" id="errorMsg"></p>

    </form>

    <p class="footer-note">
      Your info goes directly to Olanii — not shared, not sold, ever.
    </p>

  </div>

  <script>
    const form = document.getElementById('resumeForm');
    const btn  = document.getElementById('submitBtn');
    const err  = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Sending…';
      err.style.display = 'none';

      const data = new FormData(form);

      try {
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(data).toString(),
          redirect: 'follow'
        });

        if (res.redirected) {
          window.location.href = res.url;
        } else if (!res.ok) {
          const json = await res.json();
          throw new Error(json.error || 'Something went wrong.');
        }
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send me the resume →';
      }
    });
  </script>

</body>
</html>
